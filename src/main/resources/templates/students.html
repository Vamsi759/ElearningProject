<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Student List</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    }

    .container-custom {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        margin-top: 40px;
    }

    /* HEADER */
    .heading {
        background: linear-gradient(135deg, #6f42c1, #d63384);
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }

    /* BUTTON */
    .btn-add {
        background: #d63384;
        color: white;
        font-weight: 600;
        border-radius: 8px;
    }

    .btn-add:hover {
        background: #b82a70;
        transform: scale(1.05);
    }

    /* SEARCH */
    .search-box {
        max-width: 300px;
        margin: 0 auto 20px;
    }

    /* TABLE */
    .table-custom th {
        background: #6f42c1 !important;
        color: white !important;
    }

    tr:hover {
        background-color: #f5f5f5;
        transition: 0.3s;
    }

    /* ACTION BUTTONS */
    .btn-edit {
        background: #0d6efd;
        color: white;
        border-radius: 6px;
        padding: 5px 10px;
    }

    .btn-delete {
        background: #dc3545;
        color: white;
        border-radius: 6px;
        padding: 5px 10px;
    }

    .btn-edit:hover {
        background: #0b5ed7;
    }

    .btn-delete:hover {
        background: #bb2d3b;
    }
</style>

</head>

<body>

<div class="container container-custom">

    <!-- Header -->
    <div class="heading">
        <h2>📋 Student Management</h2>
    </div>

    <!-- Add Button -->
    <div class="text-center mb-3">
        <a th:href="@{/students/add}" class="btn btn-add">
            + Add New Student
        </a>
    </div>

    <!-- Search UI (frontend only) -->
    <div class="search-box">
        <input type="text" class="form-control" placeholder="🔍 Search student...">
    </div>

    <h5 class="text-center text-secondary mb-4">
        Manage your students efficiently
    </h5>

    <!-- TABLE -->
    <table class="table table-bordered table-hover text-center table-custom">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        <tr th:each="s : ${students}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.course}"></td>
            <td th:text="${s.email}"></td>

            <td>
                <a th:href="@{/students/edit/{id}(id=${s.id})}" class="btn btn-edit btn-sm">
                    ✏️ Edit
                </a>

                <a th:href="@{/students/delete/{id}(id=${s.id})}" 
                   class="btn btn-delete btn-sm"
                   onclick="return confirm('Are you sure you want to delete?')">
                    🗑 Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
